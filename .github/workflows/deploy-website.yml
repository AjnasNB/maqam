name: Deploy website

on:
  push:
    branches: [main]
    paths:
      - website/**
      - .github/workflows/deploy-website.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: maqamagent-production
  cancel-in-progress: false

jobs:
  verify:
    name: Verify website artifact
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install pinned website tools
        working-directory: website
        run: npm ci

      - name: Check content, routes, assets, accessibility contracts, and Worker media behavior
        working-directory: website
        run: npm run check

      - name: Build Wrangler upload artifact without deploying
        working-directory: website
        run: npm run deploy:dry

  deploy:
    name: Deploy verified website
    needs: verify
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: website-production
      url: https://maqamagent.com
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout verified commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Explain missing deployment credential
        if: ${{ env.CLOUDFLARE_API_TOKEN == '' || env.CLOUDFLARE_ACCOUNT_ID == '' }}
        shell: bash
        run: |
          echo "::warning::Website verification passed, but Cloudflare deployment was skipped because CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID is not configured."
          {
            echo "## Website verified; deployment not configured"
            echo
            echo "Add the repository secret \`CLOUDFLARE_API_TOKEN\` and repository variable \`CLOUDFLARE_ACCOUNT_ID\`, then rerun this workflow."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy to Cloudflare Workers
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: website
          wranglerVersion: 4.112.0
          command: deploy
