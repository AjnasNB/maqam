version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      # Major upgrades are reviewed deliberately against the supported
      # Node 22/24/26 maintained-runtime matrix instead of being auto-proposed into release work.
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
    groups:
      development-dependencies:
        dependency-type: development
  - package-ecosystem: npm
    directory: /demo/remotion
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
